apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alien-geeko.fullname" . }}-alien-geeko
  labels:
    app.kubernetes.io/part-of: suse-edge-demo
  {{- include "alien-geeko.labels" . | nindent 4 }}
  annotations:
    fleet.cattle.io/bundle-id: alien-geeko
spec:
  replicas: {{ .Values.alienGeeko.replicas }}
  selector:
    matchLabels:
      app: alien-geeko
    {{- include "alien-geeko.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: alien-geeko
        app.kubernetes.io/name: alien-geeko
      {{- include "alien-geeko.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: true
      containers:
      - env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: CLUSTER_NAME
          valueFrom:
            configMapKeyRef:
              key: CLUSTER_NAME
              name: {{ include "alien-geeko.fullname" . }}-config
              optional: true
        - name: PORT
          value: {{ quote .Values.alienGeeko.alienGeeko.env.port }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.alienGeeko.alienGeeko.image.repository }}:{{ .Values.alienGeeko.alienGeeko.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.alienGeeko.alienGeeko.imagePullPolicy }}
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        name: alien-geeko
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        resources: {{- toYaml .Values.alienGeeko.alienGeeko.resources | nindent 10 }}
        securityContext: {{- toYaml .Values.alienGeeko.alienGeeko.containerSecurityContext
          | nindent 10 }}
      nodeSelector: {{- toYaml .Values.alienGeeko.nodeSelector | nindent 8 }}
      serviceAccountName: {{ include "alien-geeko.serviceAccountName" . }}
      tolerations: {{- toYaml .Values.alienGeeko.tolerations | nindent 8 }}
      topologySpreadConstraints: {{- toYaml .Values.alienGeeko.topologySpreadConstraints
        | nindent 8 }}
