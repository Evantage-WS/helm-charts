apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "alien-geeko.fullname" . }}-reader
  labels:
  {{- include "alien-geeko.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
- nonResourceURLs:
  - /version
  verbs:
  - get

